memory:
- chapter: 1
  event: '1. 伊澤的母親教導他識別草藥的知識，這成為他與大自然親近的方式，並且深深植根在他的記憶中。


    2. 伊澤的父親是一位高階魔法師，他教導伊澤感受自然的魔力並告訴他星辰的秘密。他的父親在風和日麗的日子出發去星環之塔尋找一種強大的力量後就再也沒有回來，這段記憶對伊澤有深遠的影響。


    3. 伊澤的父親曾告誡他，魔法不僅是力量，更是一種責任，並且必須尊重它的規則和起源。這段記憶對伊澤的價值觀和行為有重要影響，他將這些教誨牢記在心。


    【角色行為變化摘要】


    1. 伊澤從一個對未知充滿渴望的村子青年，變成了一個決定追尋真相的冒險者。他從家中起身，走上了通往星環之塔的道路，這是他人生的一個重要轉折點。


    2. 伊澤由於父親的失蹤，他的行為有了明顯的改變，他選擇了追蹤父親的足跡，去尋找星環'
