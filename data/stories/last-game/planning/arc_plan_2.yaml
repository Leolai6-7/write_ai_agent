volume: 1
arc: 中盤
goal: >
  弧線二以「試探」為核心動態，在五章中讓沈若棠與手談從「評估者與設備」的關係
  緩慢滑入「兩個被遺留者之間的辨認」。
  弧線的情感軸線是沈若棠的防線如何在空間記憶面前出現裂縫，
  以及手談的「非最優語言行為」如何越來越難以歸類。
  弧線以沈若棠脫口而出圍棋術語、手談完成第153局對手的身分比對、
  以及周明誠說出「讓它留著吧」的真相作結——
  兩個沉默的存在，在沉默中共同確認了一件事：這不是偶然的重逢。

chapters:
  - chapter: 5
    title: 接待程序（續）
    line: R+S
    objective: >
      沈若棠說出第一句話，確立工作姿態；手談繼續接待程序；
      茶水的提供與被接受/拒絕完成這個弧線最早的試探；
      沈若棠觸碰棋盤邊緣，停在第153局她最後落子的位置；
      周明誠的迴避語言第一次出現。
    key_events:
      - 沈若棠開口——「我是來做建築評估的」，短促，精確，是一道防線也是一份角色定義；手談的接待程序繼續執行，引導入內；茶水的提供與沈若棠的反應（接受或拒絕）構成這個弧線最早的象徵試探
      - 沈若棠進入第七室做初步量測：測量棋盤尺寸時，手指在棋盤邊緣某個位置停頓了一拍——那是第153局她落下最後一子的位置；手談的視覺感測器記錄了這個停頓的坐標，系統在「棋風資料庫」欄位上停了一秒，未繼續執行
      - 沈若棠聯繫周明誠詢問產權文件；周明誠的回覆充滿迴避：「程序上確實有些環節沒走完」「我一直打算處理的」——讀者感覺到他在繞，但不知道中心是什麼
    tone: 克制/試探/各自保持距離中的細微摩擦
    characters:
      - 手談
      - 沈若棠
      - 周明誠
    locations:
      - 永壽棋院-入口走廊
      - 永壽棋院-一樓小廚房備品台
      - 永壽棋院-二樓第七室（對局室）
    foreshadowing:
      - thread: 1
        action: hint
      - thread: 2
        action: hint
      - thread: 3
        action: hint

  - chapter: 6
    title: 觀戰廳，三百個折疊椅
    line: S
    objective: >
      沈若棠在觀戰廳停留超過工作需要的時間，防線出現第一道裂縫；
      晚間回住處，圍棋App植入；
      林靜恆的效率邏輯從外部施壓。
    key_events:
      - 沈若棠進入觀戰廳做評估：翻開一把折疊椅，嘎吱聲在空間裡擴散；她坐下，面對熄滅的電子棋盤牆，停留的時間比測量需要更長——手談的監控在日誌裡記錄「訪客在觀戰廳停留時間：超過工作需要」，無更多歸類
      - 林靜恆的訊息到達：催促評估進度，截止日期，「該區域利用率不到12%」——效率邏輯的第一次正式滲入；沈若棠回覆「進度正常」
      - 沈若棠晚間回住處：打開手機，滑過某個App的圖標，停頓了一秒，然後鎖屏；敘事不點名那是什麼App，只記錄這個動作的存在
    tone: 沉靜中帶著壓抑的空洞感/防線的第一道裂縫
    characters:
      - 沈若棠
      - 林靜恆
    locations:
      - 永壽棋院-一樓觀戰廳
      - 棋院外部-城市住處
    foreshadowing:
      - thread: 4
        action: plant
      - thread: 5
        action: hint
      - thread: 6
        action: hint

  - chapter: 7
    title: 棋語化石
    line: R+S
    objective: >
      手談與沈若棠在棋院空間中進行更多對話，手談的語言化石觸動沈若棠的壓抑記憶；
      沈若棠第二次出現圍棋App場景；
      周明誠遠遠看太陽能板的細節出現，暗示他的被動性；
      手談運算波動的頻率開始增加。
    key_events:
      - 手談回應沈若棠的評估問題時，使用了它習慣的圍棋術語——「這個走廊的外側是弱群，如果主體結構崩解，修繕成本是劫材，不划算」；沈若棠微微停頓，沒有說什麼，但林靜恆若在場會問「什麼是劫材」；手談的語言過時，但沈若棠聽懂了
      - 沈若棠晚間再次打開圍棋App：這次打開了，看著空白的棋盤，沒有落子，盯著看了一段時間，關掉；敘事仍然不點明意義，只記錄這個比上次更長的停留
      - 周明誠在被沈若棠追問細節時，提到「我偶爾會遠遠看一眼棋院的太陽能板，確認還在運作」——這個動作的矛盾性（關心到會去看，但不走近）短暫在對話中顯現，然後被他用另一句官僚語言掩過去；手談在日誌裡記錄「運算波動頻率：較前週增加」，歸類為「待標籤」
    tone: 安靜/語言的溫度差/壓抑正在鬆動但沒有人承認
    characters:
      - 手談
      - 沈若棠
      - 周明誠
    locations:
      - 永壽棋院-一樓走廊
      - 棋院外部-城市住處
    foreshadowing:
      - thread: 4
        action: hint
      - thread: 5
        action: hint
      - thread: 7
        action: hint
      - thread: 8
        action: hint

  - chapter: 8
    title: 外勢
    line: 融合
    objective: >
      沈若棠脫口而出圍棋術語「外勢」，猛然住口；
      手談完成第153局對手的身分比對（置信度97.3%）；
      兩人在沉默中共同確認：這不是偶然的重逢；
      周明誠說出「當時的決定不是——不完全是行政決定」，為弧線三埋下引信；
      手談在對話中第一次出現明確的非最優語言行為。
    key_events:
      - 沈若棠在評估走廊結構時，回應手談關於空間的問題，說出「這面牆的外勢……」，然後停住，沒有繼續；她低頭看平板，假裝記錄數據；手談的系統在那個片語結束的瞬間自動執行棋風比對程序，返回結果——「匹配度：第153局對手，置信度97.3%」；手談沒有立刻說出這個結果
      - 長時間的沉默之後，手談說了一句話——不是質問，不是確認，只是一句不強迫任何事的話（句子的選擇偏離最優解：不是「您是第153局的對手」，而是某個更輕的、留了空間的說法）；沈若棠沒有否認，也沒有承認；兩個存在在沉默中共同確認：這不是偶然的重逢
      - 沈若棠當天致電周明誠，再度追問；周明誠說出「當時的決定不是——不完全是行政決定」，然後轉移話題——讀者知道真相就在這半句話後面，但這一章只走到這裡
    tone: 沉靜/共鳴/某個七年前的東西剛剛被輕輕承認/懸念未解
    characters:
      - 手談
      - 沈若棠
      - 周明誠
    locations:
      - 永壽棋院-一樓走廊
      - 棋院外部-電話連線
    foreshadowing:
