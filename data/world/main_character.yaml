background: 伊澤出生於東大陸邊境的阿羅恩村，母親是草藥師，父親在他幼年時失踪。傳言父親曾是星環之塔的高階魔法師，後來與禁咒有關的實驗失敗而失踪。他從小就對魔法極為敏感。
gender: 男性
goals:
- 找出父親失蹤的真相
- 成為星環之塔的正式魔導士
- 解開禁咒的本質與歷史真相
memory:
- chapter: 1
  event: '1. 行為變化：伊澤從一開始的期待和不安，到後來的緊張和興奮，再到最後的決定和堅定，他的行為表現出他對尋找父親真相的渴望以及對未知的勇氣。他從一個被動的尋找者，變成了一個積極的行動者，決定去面對未知的危險。


    2. 心理變化：伊澤一開始的心理狀態是期待和不安，這可能源於他對圖書館可能藏有揭開他父親失蹤真相的古老地圖的期待，以及對未知的不安。然後他的心理狀態變為緊張和興奮，這可能是因為他找到了可能揭開他父親失蹤真相的地圖。最後，他的心理狀態變為決定和堅定，這可能是因為他決定去面對未知的危險，並堅定地尋找父親的真相。


    3. 重要記憶：伊澤的重要記憶包括他父親失蹤的事實，以及他在父親遺留的書中見過的符號。這些記憶對他來說非常重要，因為他們可能是揭開他父親失蹤真相的關鍵。'
