age: 10
background: 伊澤出生於東大陸邊境的阿羅恩村，母親是草藥師，父親在他幼年時失踪。傳言父親曾是星環之塔的高階魔法師，後來與禁咒有關的實驗失敗而失踪。他從小就對魔法極為敏感。
gender: 男性
goals:
- 找出父親失蹤的真相
- 成為星環之塔的正式魔導士
- 解開禁咒的本質與歷史真相
memory:
- chapter: 1
  event: '1. 行為變化：伊澤從一開始的緊張和不確定，到後來的自信和堅定，他的行為表現出他對知識的渴望以及對揭開父親失蹤真相的決心。他的行為也顯示出他的智慧和謹慎，如他選擇以間接的方式提問，避免引起不必要的注意。


    2. 心理變化：伊澤在進入圖書館時，心中充滿了期待和緊張。然而，當他進入私人閱覽室，看到那些古老的書籍時，他的心跳加速，興奮和期待的情緒取代了緊張。他對知識的渴望讓他忘記了恐懼，全身心投入到書籍的世界中。


    3. 重要記憶：伊澤的父親失蹤是他的重要記憶，這也是他來到圖書館尋找答案的原因。他對星環之塔的歷史和高階魔法師的故事顯示出他對魔法和知識的深厚興趣。他在私人閱覽室中觸摸到的古老書籍，以及圖書管理員對他的認可，都是他將來可能會回憶的重要經歷。'
- chapter: 2
  event: "1. 行為變化：\n   - 伊澤在閱讀古書時，表現出高度的專注和尊重，顯示他對知識的尊重和渴望。\n   - 伊澤在發現有人接近閱覽室時，立即將書本放回原處，並躲到書櫃後面，這表現出他的警覺性和機敏反應。\n\
    \   - 伊澤在被神秘人物發現後，選擇勇敢地站出來，而不是繼續躲藏，顯示他的勇氣和決心。\n\n2. 心理變化：\n   - 伊澤在閱覽室中閱讀古書時，心跳逐漸平靜，顯示他對知識的追尋和尊重。\n\
    \   - 當他發現有人接近閱覽室時，心中的警鐘突然響起，顯示他的緊張和警覺。\n   - 當神秘人物開始翻看他剛才閱讀的古書時，伊澤心中的不安愈演愈烈，顯示他對書中秘密的重視和害怕被他人發現的焦慮。\n\
    \   - 在被神秘人物發現後，伊澤選擇勇敢面對，顯示他的勇氣和決心。\n\n3. 重要記憶：\n   - 伊澤記得父親曾傳授給他的隱"
- chapter: 3
  event: "1. 行為變化：\n   - 伊澤從一個單純求知的讀者變為一個尋找真理的探索者，他開始主動與外界互動，尋找父親失踪的線索。\n   - 伊澤在閱覽室中找到一本與父親遺物相關的書，並成功解開書中的機關，這顯示他的行為已從被動轉為主動，並且顯示出他的智慧和毅力。\n\
    \   - 伊澤決定踏入通往星環之塔的秘密通道，顯示他已經準備好面對未知的危險，並且他的行為已經從保守變為勇敢。\n\n2. 心理變化：\n   - 伊澤在初次與神秘人物對峙後，心中充滿了混亂與興奮，顯示他的心理狀態從穩定轉為不安定。\n\
    \   - 當他在閱覽室中找到可能解開父親失踪之謎的書籍時，他感到激動，這顯示他的心情從平靜轉為興奮。\n   - 在踏入秘密通道的那一刻，伊澤的心跳加速，顯示他的心理狀態從冷靜變為緊張。\n\
    \n3. 重要記憶：\n   - 伊澤記得父親"
- chapter: 4
  event: '1. 伊澤的父親是一位偉大的魔法師，曾在星環之塔的迷宮般的通道中尋找過失落的秘密。這是伊澤對父親的記憶，也是他踏上尋找父親和真相之旅的動力來源。

    2. 伊澤的母親堅持讓他學習古代語文，這對他在塔內的探索提供了極大的幫助，他能夠辨識並解讀牆上的符號，這也是他的重要記憶之一。

    3. 伊澤記得父親曾說過，真正的魔法師必須在智慧與勇氣之間找到平衡。這是他在遇到選擇時的重要參考，也是他在解答智力問題時的動力來源。


    【角色行為變化】

    1. 伊澤從對星環之塔的凝望，到深吸一口冷空氣並步入塔內，顯示出他的行為從觀察轉變為行動。

    2. 當遇到分岔路口，伊澤選擇了「智慧」的路徑，顯示他的行為受到了父親的影響，同時也展現了他對知識的渴望和對挑戰的勇氣。

    3. 在遇到謎題板時，伊澤集中精神，逐一解'
- chapter: 5
  event: '1. 行為變化：伊澤在小說開始時顯得有些不確定和緊張，但隨著他對自己的魔法能力的信心增強，他的行為也變得更為積極和自信。他從口袋裡掏出父親的筆記本，找到並成功念誦了激活元素寶石的咒語，並成功打開了石門。


    2. 心理變化：伊澤在進入星環之塔的過程中，他的心態經歷了由緊張和不確定到自信和期待的轉變。他對自己的魔法能力有了更多的信心，並對即將發現的魔法秘密充滿了期待。


    3. 重要記憶：伊澤從母親那裡學到的魔法知識，以及父親留給他的遺物——記載著許多寶貴魔法知識的筆記本，這兩個記憶在他成功打開石門的過程中起到了關鍵作用。這些記憶不僅提供了他需要的知識，也給他帶來了信心和勇氣。'
name: 伊澤·艾爾文
occupation: 魔導學徒
personality:
- 倔強
- 極具求知慾
- 不輕易相信他人
race: 人類
skills:
- 初級元素魔法（火、水）
- 古代語文辨識
- 生存技能（草藥辨識、陷阱設置）
speaking_style: 不愛言語，習慣自己消化情緒，習慣思考。
weaknesses:
- 容易情緒內耗
- 對禁咒與父親的話題過度執著
