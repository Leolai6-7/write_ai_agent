age: 10
background: 伊澤出生於東大陸邊境的阿羅恩村，母親是草藥師，父親在他幼年時失踪。傳言父親曾是星環之塔的高階魔法師，後來與禁咒有關的實驗失敗而失踪。他從小就對魔法極為敏感。
gender: 男性
goals:
- 找出父親失蹤的真相
- 成為星環之塔的正式魔導士
- 解開禁咒的本質與歷史真相
memory:
- chapter: 1
  event: '1. 行為變化：伊澤從一個對家鄉熟悉且安於現狀的青年，變為勇敢踏出舒適圈，面對未知與危險的探險者。他從無知的青年變為尋求真相的勇者，並願意為此冒險。


    2. 心理變化：伊澤的心理狀態從舒適、安穩變為焦慮、擔憂，但是他仍然堅持尋找真相。他對未知的渴望與擔憂交織，這種矛盾的情緒在他的心中不斷激盪。


    3. 重要記憶：伊澤在家族舊書的夾頁中發現了一張地圖，這張地圖指向一個神秘的地點——被稱為“靈魂圖書館”的場所。這個記憶是伊澤踏上尋找真相道路的起點，也是他人生轉折的關鍵。他對父親的失蹤一直深感困擾，這張地圖可能是解開父親失蹤謎團的關鍵。'
name: 伊澤·艾爾文
occupation: 魔導學徒
personality:
- 倔強
- 極具求知慾
- 不輕易相信他人
race: 人類
skills:
- 初級元素魔法（火、水）
- 古代語文辨識
- 生存技能（草藥辨識、陷阱設置）
speaking_style: 不愛言語，習慣自己消化情緒，習慣思考。
weaknesses:
- 容易情緒內耗
- 對禁咒與父親的話題過度執著
