age: 10
background: 伊澤出生於東大陸邊境的阿羅恩村，母親是草藥師，父親在他幼年時失踪。傳言父親曾是星環之塔的高階魔法師，後來與禁咒有關的實驗失敗而失踪。他從小就對魔法極為敏感。
gender: 男性
goals:
- 找出父親失蹤的真相
- 成為星環之塔的正式魔導士
- 解開禁咒的本質與歷史真相
memory:
- chapter: 1
  event: '1. 行為變化：伊澤原本是個孤獨的魔導學徒，但在獲得父親留下的地圖後，他的行為變得更加積極，主動尋找線索，並開始對外界展現出更多的好奇與探索欲望。他從星環之塔的密室獲得地圖後，前往阿羅恩村的圖書館尋找更多線索，並在獲得格拉德斯的指引後，決定前往地圖所指的位置探索。


    2. 心理變化：伊澤在獲得地圖後，心中充滿了對父親的懷念和對真相的渴望。他的情緒從最初的困惑與無助，轉變為對未知的好奇與興奮。他在看到古圖書館的插畫時，心中湧現出強烈的激動，顯示他對找到真相的渴望與決心。


    3. 重要記憶：伊澤的父親在他很小的時候就消失了，留下的只有這張地圖和無盡的謎團。這是他的一個重要記憶，也是他尋找真相的動力來源。他將這張地圖視為唯一的線索，並相信他可以通過這張地圖找到父親的蹤跡，解開所有的'
name: 伊澤·艾爾文
occupation: 魔導學徒
personality:
- 倔強
- 極具求知慾
- 不輕易相信他人
race: 人類
skills:
- 初級元素魔法（火、水）
- 古代語文辨識
- 生存技能（草藥辨識、陷阱設置）
speaking_style: 不愛言語，習慣自己消化情緒，習慣思考。
weaknesses:
- 容易情緒內耗
- 對禁咒與父親的話題過度執著
