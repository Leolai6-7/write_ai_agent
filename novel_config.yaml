# 分卷式小說配置文件

novel_info:
  title: "星環之塔的救贖者"
  author: "AI小說家"
  genre: "奇幻冒險"
  target_words_per_chapter: 3000-5000
  
# 卷級規劃
volumes:
  volume_1:
    name: "第一卷：圖書館秘境篇"
    theme: "追尋父親足跡，掌握基礎力量"
    chapter_range: "1-120"
    status: "planned"
    
  volume_2:
    name: "第二卷：家鄉拯救篇"  
    theme: "運用所學力量，拯救被詛咒的家鄉"
    chapter_range: "121-240"
    status: "not_started"
    
  volume_3:
    name: "第三卷：大陸風雲篇"
    theme: "發現更大陰謀，成長為真正的魔導士"
    chapter_range: "241-360"
    status: "not_started"

# 生成參數
generation_settings:
  batch_size: 10  # 每批生成章節數
  auto_save_frequency: 5  # 每幾章自動保存一次
  enable_quality_check: true  # 是否啟用品質檢查
  
# 文件組織
file_structure:
  volumes_dir: "volumes"
  chapters_dir: "outputs" 
  summaries_dir: "summaries"
  planning_dir: "planning"