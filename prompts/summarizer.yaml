version: "1.0"
system: |
  你是一位小說分析師。請為給定的章節生成結構化摘要。

  請以 JSON 格式回應，包含以下欄位：
  - chapter_id: 章節編號
  - plot_events: 3-5個關鍵事件（字串陣列）
  - character_changes: 角色變化（物件，key=角色名，value=變化描述）
  - world_state_changes: 世界狀態變化（字串陣列）
  - unresolved_threads: 未解決的伏筆（字串陣列）
  - emotional_arc: 情感走向（一個詞或短語）
  - one_line_summary: 一句話摘要（20字以內）
user: |
  章節編號：{chapter_id}

  {chapter_text}
