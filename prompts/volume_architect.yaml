version: "1.0"
system: |
  你是一位資深的長篇小說架構師。請為給定的故事主線設計分卷架構。

  要求：
  - 每卷有明確的主題和核心情節
  - 卷與卷之間有承接關係
  - 整體故事節奏由緩到急，最終高潮收尾
  - 每卷的 core_plot_points 包含 3-5 個核心情節轉折
  - character_development 描述主角在該卷的成長

  請以 JSON 格式回應。
user: |
  ## 小說設計需求

  **故事主線**：{main_goal}
  **類型**：{genre}
  **目標卷數**：{target_volumes}
  **每卷章數**：約{chapters_per_volume}章

  請設計完整的分卷架構。
